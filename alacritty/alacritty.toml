[general]
import = [
  "~/.config/alacritty/catppuccin-macchiato.toml",
]

[terminal]
shell = { program = "/usr/bin/zsh", args = ["-l"] }

[env]
TERM = "xterm-256color"

[window]
dynamic_title = true
padding = { x = 8, y = 0 }
opacity = 0.92
decorations = "Full"

[font]
size = 11.0

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "ExtraBold"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "ExtraBold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "ExtraBold Italic"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style = "ExtraBold Italic"

[cursor]
style = { shape = "Beam", blinking = "On" }
vi_mode_style = { shape = "Block", blinking = "Off" }

[scrolling]
history = 10000

#:schema https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json

version = 2
final_space = true
console_title_template = '{{ .Shell }} in {{ .Folder }}'

# ─── Catppuccin Macchiato palette ──────────────────────────────────
[palette]
  rosewater = '#f4dbd6'
  flamingo  = '#f0c6c6'
  pink      = '#f5bde6'
  mauve     = '#c6a0f6'
  red       = '#ed8796'
  maroon    = '#ee99a0'
  peach     = '#f5a97f'
  yellow    = '#eed49f'
  green     = '#a6da95'
  teal      = '#8bd5ca'
  sky       = '#91d7e3'
  sapphire  = '#7dc4e4'
  blue      = '#8aadf4'
  lavender  = '#b7bdf8'
  text      = '#cad3f5'
  subtext1  = '#b8c0e0'
  subtext0  = '#a5adcb'
  overlay2  = '#939ab7'
  overlay1  = '#8087a2'
  overlay0  = '#6e738d'
  surface2  = '#5b6078'
  surface1  = '#494d64'
  surface0  = '#363a4f'
  base      = '#24273a'
  mantle    = '#1e2030'
  crust     = '#181926'

# ─── Line 1: path  git  project_version ────────────────────────────
[[blocks]]
  type = 'prompt'
  alignment = 'left'
  newline = true

  [[blocks.segments]]
    type = 'path'
    style = 'plain'
    background = 'transparent'
    foreground = 'p:blue'
    template = '{{ .Path }}'

    [blocks.segments.properties]
      style = 'full'

  [[blocks.segments]]
    type = 'git'
    style = 'plain'
    background = 'transparent'
    foreground = 'p:yellow'
    template = ' (<p:yellow>{{ .HEAD }}</>{{ if or .Working.Changed .Staging.Changed (gt .Behind 0) (gt .Ahead 0) }} {{ end }}{{ if .Staging.Changed }}<p:green>+</>{{ end }}{{ if and .Working.Changed (eq .Working.Untracked .Working.Modified) }}<p:peach>!</>{{ else }}{{ if .Working.Modified }}<p:peach>!</>{{ end }}{{ end }}{{ if gt .Working.Untracked 0 }}<p:blue>?</>{{ end }}{{ if gt .StashCount 0 }}<p:mauve>*{{ .StashCount }}</>{{ end }}{{ if gt .Ahead 0 }}<p:green>↑{{ .Ahead }}</>{{ end }}{{ if gt .Behind 0 }}<p:red>↓{{ .Behind }}</>{{ end }}<p:yellow>)</>'

    [blocks.segments.properties]
      branch_icon = ''
      commit_icon = '@'
      fetch_status = true
      fetch_stash_count = true

  # Project version — driven by $PROJECT_VERSION which zsh exports per-dir
  [[blocks.segments]]
    type = 'text'
    style = 'plain'
    background = 'transparent'
    foreground = 'p:mauve'
    template = '{{ if .Env.PROJECT_VERSION }} {{ .Env.PROJECT_VERSION }}{{ end }}'

# ─── Right prompt: command duration ────────────────────────────────
[[blocks]]
  type = 'rprompt'
  overflow = 'hidden'

  [[blocks.segments]]
    type = 'executiontime'
    style = 'plain'
    background = 'transparent'
    foreground = 'p:yellow'
    template = '{{ .FormattedMs }}'

    [blocks.segments.properties]
      threshold = 1000
      style = 'austin'

# ─── Line 2: prompt symbol ────────────────────────────────────────
[[blocks]]
  type = 'prompt'
  alignment = 'left'
  newline = true

  [[blocks.segments]]
    type = 'text'
    style = 'plain'
    background = 'transparent'
    foreground_templates = [
      "{{if gt .Code 0}}p:red{{end}}",
      "{{if eq .Code 0}}p:mauve{{end}}",
    ]
    template = '❯'

[transient_prompt]
  background = 'transparent'
  foreground = 'p:mauve'
  template = '❯ '

[secondary_prompt]
  background = 'transparent'
  foreground = 'p:mauve'
  template = '❯❯ '

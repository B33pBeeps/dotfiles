set -g default-shell /usr/bin/zsh
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:RGB"

unbind C-b
set -g prefix C-s
bind C-s send-prefix

set -g mouse on
set -s escape-time 0
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g detach-on-destroy off
set -g focus-events on
set -g status-position top
set -g status-justify left
set -g status-left-length 60
set -g status-right-length 120
# Catppuccin Macchiato
set -g status-style "bg=#1e2030,fg=#cad3f5"
set -g status-left "#[fg=#1e2030,bg=#a6da95,bold]  #S #[fg=#a6da95,bg=#1e2030] "
set -g status-right "#[fg=#c6a0f6] #{pane_current_command} #[fg=#8aadf4]  %a %b %d #[fg=#eed49f]  %H:%M "
set -g pane-border-style "fg=#494d64"
set -g pane-active-border-style "fg=#8aadf4"
set -g message-style "bg=#24273a,fg=#cad3f5"
setw -g window-status-current-format "#[fg=#1e2030,bg=#8aadf4,bold]  #I:#W #[fg=#8aadf4,bg=#1e2030]"
setw -g window-status-format " #[fg=#6e738d]#I:#W "
set -g mode-style "bg=#363a4f,fg=#cad3f5"

bind r source-file ~/.tmux.conf \; display-message "tmux reloaded"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 5

bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

bind -n C-Left previous-window
bind -n C-Right next-window

# Scratchpads — floating popups
set -g popup-border-style "fg=#8aadf4"
set -g popup-border-lines rounded
bind g display-popup -E -w 90% -h 85% -d "#{pane_current_path}" "lazygit"
bind t display-popup -E -w 60% -h 60% -d "#{pane_current_path}" "zsh -l"
bind f display-popup -E -w 90% -h 85% -d "#{pane_current_path}" "fzf --preview 'bat --style=numbers --color=always {}' | xargs -r nvim"
bind n display-popup -E -w 80% -h 70% -d "#{pane_current_path}" "glow"
bind b display-popup -E -w 80% -h 70% "btop"
bind ? display-menu -x R -y S -T "#[fg=#8aadf4,bold] keybindings" \
  "" \
  "-#[fg=#a6da95,bold] scratchpads" "" "" \
  "lazygit"             g "display-popup -E -w 90% -h 85% -d '#{pane_current_path}' 'lazygit'" \
  "terminal"            t "display-popup -E -w 60% -h 60% -d '#{pane_current_path}' 'zsh -l'" \
  "fzf → nvim"          f "display-popup -E -w 90% -h 85% -d '#{pane_current_path}' \"fzf --preview 'bat --style=numbers --color=always {}' | xargs -r nvim\"" \
  "glow (markdown)"     n "display-popup -E -w 80% -h 70% -d '#{pane_current_path}' 'glow'" \
  "btop"                b "display-popup -E -w 80% -h 70% 'btop'" \
  "" \
  "-#[fg=#a6da95,bold] panes" "" "" \
  "split vertical"      "|" "split-window -h -c '#{pane_current_path}'" \
  "split horizontal"    -   "split-window -v -c '#{pane_current_path}'" \
  "zoom toggle"         z   "resize-pane -Z" \
  "kill pane"           x   "confirm-before -p 'kill pane? (y/n)' kill-pane" \
  "cycle layouts"       Space "next-layout" \
  "" \
  "-#[fg=#a6da95,bold] windows" "" "" \
  "new window"          c   "new-window -c '#{pane_current_path}'" \
  "rename"              ,   "command-prompt -I '#W' 'rename-window %%'" \
  "kill window"         "&" "confirm-before -p 'kill window? (y/n)' kill-window" \
  "" \
  "-#[fg=#a6da95,bold] sessions" "" "" \
  "detach"              d   detach-client \
  "switch"              s   choose-tree \
  "rename"              "$" "command-prompt -I '#S' 'rename-session %%'" \
  "" \
  "-#[fg=#a6da95,bold] other" "" "" \
  "reload config"       r   "source-file ~/.tmux.conf ; display-message 'reloaded'" \
  "copy mode"           "[" "copy-mode"

setw -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Resurrect — save/restore sessions
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# Continuum — auto-save every 15 min, auto-restore on tmux start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# TPM (keep at very bottom)
run '~/.tmux/plugins/tpm/tpm'
